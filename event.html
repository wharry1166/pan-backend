<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>事件详情 — 潘元川</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    .event-detail {
      min-height: 60vh;
      padding: 140px 0 80px;
    }
    .event-detail .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-family: var(--font-mono);
      margin-bottom: 40px;
      transition: color var(--transition);
      text-decoration: none;
    }
    .event-detail .back-link:hover {
      color: var(--accent);
    }
    .event-detail .detail-year {
      font-family: var(--font-mono);
      font-size: 0.95rem;
      color: var(--accent);
      margin-bottom: 12px;
    }
    .event-detail .detail-title {
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 600;
      margin-bottom: 32px;
    }
    .event-detail .detail-divider {
      width: 60px;
      height: 2px;
      background: var(--accent);
      margin-bottom: 40px;
    }
    .event-detail .detail-content {
      color: var(--text-secondary);
      font-size: 1.05rem;
      line-height: 1.9;
    }
    .event-detail .detail-content p {
      margin-bottom: 1.2em;
    }
    .event-detail .detail-content p:last-child {
      margin-bottom: 0;
    }
    .event-detail .detail-placeholder {
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.9rem;
      padding: 40px;
      border: 1px dashed var(--border);
      border-radius: var(--radius-md);
      text-align: center;
    }

    /* ===== Gallery ===== */
    .gallery-section {
      margin-top: 48px;
      padding-top: 40px;
      border-top: 1px solid var(--border);
    }
    .gallery-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 20px;
      color: var(--text-primary);
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }
    .gallery-item {
      position: relative;
      border-radius: var(--radius-md);
      overflow: hidden;
      aspect-ratio: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      cursor: zoom-in;
    }
    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }
    .gallery-item:hover img {
      transform: scale(1.05);
    }
    .gallery-item .del-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 2;
      backdrop-filter: blur(4px);
    }
    .gallery-item:hover .del-btn {
      opacity: 1;
    }
    .gallery-item .play-badge {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 44px;
      height: 44px;
      background: rgba(0,0,0,0.65);
      border: 2px solid rgba(255,255,255,0.8);
      border-radius: 50%;
      color: #fff;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      backdrop-filter: blur(4px);
    }
    .upload-area {
      border: 2px dashed var(--border);
      border-radius: var(--radius-md);
      padding: 36px 20px;
      text-align: center;
      cursor: pointer;
      transition: all var(--transition);
      color: var(--text-muted);
    }
    .upload-area:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }
    .upload-area input {
      display: none;
    }
    .upload-area .upload-icon {
      font-size: 2rem;
      margin-bottom: 6px;
    }
    .upload-area .upload-text {
      font-size: 0.9rem;
    }
    .upload-area .upload-hint {
      font-size: 0.78rem;
      margin-top: 4px;
      opacity: 0.5;
    }

    /* ===== Lightbox ===== */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 30px;
      cursor: zoom-out;
    }
    .lightbox.active {
      display: flex;
    }
    .lightbox img {
      max-width: 94vw;
      max-height: 94vh;
      object-fit: contain;
      border-radius: 6px;
    }
    .lightbox-close {
      position: absolute;
      top: 24px;
      right: 30px;
      font-size: 2rem;
      color: #fff;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.2s;
      line-height: 1;
      z-index: 1001;
    }
    .lightbox-close:hover {
      opacity: 1;
    }
    .lightbox-download {
      position: absolute;
      top: 24px;
      right: 72px;
      font-size: 1.5rem;
      color: #fff;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.2s;
      text-decoration: none;
      z-index: 1001;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
    }
    .lightbox-download:hover {
      opacity: 1;
      background: rgba(255,255,255,0.2);
    }

    /* ===== Toast ===== */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(16px);
      padding: 14px 28px;
      border-radius: 60px;
      border: 1px solid rgba(245, 200, 66, 0.2);
      box-shadow: 0 8px 40px rgba(0,0,0,0.3);
      font-weight: 600;
      color: #111;
      font-size: 0.95rem;
      z-index: 2000;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      text-align: center;
      white-space: nowrap;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <!-- Page Transition -->
  <div class="page-transition" id="pageTransition"></div>

  <!-- Back to Top -->
  <button class="back-to-top" id="backToTop" aria-label="回到顶部">↑</button>

  <div id="nav-slot"></div>

  <section class="event-detail section">
    <div class="container">
      <a href="index.html#about" class="back-link">← Back to Timeline</a>

      <div class="detail-year" id="detailYear"></div>
      <h1 class="detail-title" id="detailTitle"></h1>
      <div class="detail-divider"></div>
      <div class="detail-content rich-text" id="detailContent">
        <div class="detail-placeholder">内容待补充 · Coming Soon</div>
      </div>

      <!-- Gallery -->
      <div class="gallery-section" id="gallerySection">
        <div class="gallery-title">🎬 珍贵的影像资料</div>
        <div class="gallery-grid" id="galleryGrid"></div>
        <div class="upload-area" id="uploadArea">
          <input type="file" id="fileInput" accept="image/*,video/*" multiple />
          <div class="upload-icon">📸</div>
          <div class="upload-text">点击上传图片</div>
          <div class="upload-hint">支持 JPG / PNG / MP4 格式</div>
        </div>
      </div>
    </div>
  </section>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <span class="lightbox-close">✕</span>
    <a class="lightbox-download" id="lightboxDownload" download title="保存到电脑">⬇</a>
    <img id="lightboxImg" src="" alt="" style="display:none;" />
    <video id="lightboxVideo" controls style="display:none;max-width:94vw;max-height:94vh;border-radius:6px;"></video>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <div id="footer-slot"></div>

  <script src="js/components.js"></script>
  <script>
    // ---- Page Transition ----
    (function() {
      const pt = document.getElementById('pageTransition');
      if (pt) pt.classList.remove('active');
    })();

    // ---- Back to Top ----
    (function initBackToTop() {
      const btn = document.getElementById('backToTop');
      if (!btn) return;
      let ticking = false;
      function check() {
        if (window.scrollY > 400) {
          btn.classList.add('visible');
        } else {
          btn.classList.remove('visible');
        }
        ticking = false;
      }
      window.addEventListener('scroll', () => {
        if (!ticking) { requestAnimationFrame(check); ticking = true; }
      });
      btn.addEventListener('click', () => {
        if (window.lenis) window.lenis.scrollTo(0);
        else window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    })();

    // ---- Detail content auto rich text ----
    (function enrichDetail() {
      const el = document.getElementById('detailContent');
      if (!el || el.querySelector('.detail-placeholder')) return;
      // Wrap standalone text nodes in <p> — content is already inline HTML, skip
    })();
  </script>
  <script>
    // ===== 从 API 加载事件 =====
    (async function init() {
      const params = new URLSearchParams(window.location.search);
      const y = params.get('y');
      const n = params.get('n');

      if (!y || !n) {
        document.getElementById('detailYear').textContent = '???';
        document.getElementById('detailTitle').textContent = '事件未找到';
        document.getElementById('gallerySection').style.display = 'none';
        return;
      }

      try {
        const res = await fetch(`/api/events/${y}/${n}`);
        if (!res.ok) throw new Error('Not found');
        const { event, media } = await res.json();

        document.getElementById('detailYear').textContent = event.year;
        document.getElementById('detailTitle').textContent = event.name;
        document.getElementById('detailContent').innerHTML = event.content;
        document.title = `${event.name} — 潘元川`;

        initGallery(event.id, media);
      } catch {
        document.getElementById('detailYear').textContent = '???';
        document.getElementById('detailTitle').textContent = '事件未找到';
        document.getElementById('detailContent').innerHTML = '<div class="detail-placeholder">这个事件还没有记录呢</div>';
        document.getElementById('gallerySection').style.display = 'none';
      }
    })();

    // ===== Gallery (API 驱动) =====
    function initGallery(eventId, initialMedia) {
      const gallerySection = document.getElementById('gallerySection');
      const galleryGrid = document.getElementById('galleryGrid');
      const uploadArea = document.getElementById('uploadArea');
      const fileInput = document.getElementById('fileInput');
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightboxImg');
      const lightboxVideo = document.getElementById('lightboxVideo');
      const lightboxClose = document.querySelector('.lightbox-close');
      const lightboxDownload = document.getElementById('lightboxDownload');

      const token = localStorage.getItem('pan_token');

      // Show upload area only if logged in
      if (!token) {
        uploadArea.style.display = 'none';
      }

      // ---- Render ----
      function renderGallery(media) {
        gallerySection.style.display = 'block';
        if (!media || media.length === 0) {
          galleryGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--text-muted);font-size:0.85rem;padding:32px 0;">还没有影像，点击下方上传 🎬</div>';
          return;
        }
        galleryGrid.innerHTML = media.map((item, i) => {
          const src = '/' + item.file_path;
          const vid = item.is_video;
          const delBtn = token ? `<button class="del-btn" data-media-id="${item.id}" title="删除">✕</button>` : '';
          return `
            <div class="gallery-item" data-index="${i}">
              ${vid
                ? `<video src="${src}" muted preload="metadata" style="width:100%;height:100%;object-fit:cover;"></video><div class="play-badge">▶</div>`
                : `<img src="${src}" alt="图片 ${i+1}" loading="lazy" style="width:100%;height:100%;object-fit:cover;" />`
              }
              ${delBtn}
            </div>
          `;
        }).join('');
      }

      renderGallery(initialMedia);

      // ---- Upload ----
      if (token) {
        uploadArea.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', async function() {
          const files = Array.from(this.files);
          if (files.length === 0) return;
          for (const file of files) {
            if (!file.type.startsWith('image/') && !file.type.startsWith('video/')) continue;
            const formData = new FormData();
            formData.append('file', file);
            formData.append('eventId', eventId);
            await fetch('/api/admin/media/upload', {
              method: 'POST',
              headers: { 'Authorization': 'Bearer ' + token },
              body: formData
            });
          }
          // Reload media list
          const res = await fetch(`/api/events/${window.location.search.split('=')[1]}/${window.location.search.split('=')[2] || ''}`);
          // simpler: just reload
          const params = new URLSearchParams(window.location.search);
          const reloadRes = await fetch(`/api/events/${params.get('y')}/${params.get('n')}`);
          const data = await reloadRes.json();
          renderGallery(data.media);
          fileInput.value = '';
          showToast('上传成功');
        });
      }

      // ---- Delete ----
      galleryGrid.addEventListener('click', async e => {
        const btn = e.target.closest('.del-btn');
        if (!btn || !token) return;
        e.stopPropagation();
        if (!confirm('确定删除？')) return;
        const mediaId = btn.dataset.mediaId;
        await fetch(`/api/admin/media/${mediaId}`, {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const params = new URLSearchParams(window.location.search);
        const reloadRes = await fetch(`/api/events/${params.get('y')}/${params.get('n')}`);
        const data = await reloadRes.json();
        renderGallery(data.media);
        showToast('已删除');
      });

      // ---- Lightbox ----
      galleryGrid.addEventListener('click', async e => {
        const item = e.target.closest('.gallery-item');
        if (!item || e.target.closest('.del-btn')) return;
        const idx = parseInt(item.dataset.index);
        const params = new URLSearchParams(window.location.search);
        const res = await fetch(`/api/events/${params.get('y')}/${params.get('n')}`);
        const data = await res.json();
        const mediaItem = data.media[idx];
        if (!mediaItem) return;
        const src = '/' + mediaItem.file_path;
        const vid = mediaItem.is_video;
        lightboxImg.style.display = vid ? 'none' : 'block';
        lightboxVideo.style.display = vid ? 'block' : 'none';
        if (vid) {
          lightboxVideo.src = src;
          lightboxVideo.play();
        } else {
          lightboxImg.src = src;
        }
        lightboxDownload.href = src;
        lightbox.classList.add('active');
      });

      function closeLightbox() {
        lightbox.classList.remove('active');
        lightboxImg.src = '';
        lightboxVideo.pause();
        lightboxVideo.src = '';
      }
      lightboxClose.addEventListener('click', closeLightbox);
      lightbox.addEventListener('click', closeLightbox);
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeLightbox();
      });

      // ---- Toast ----
      let toastTimer = null;
      function showToast(msg) {
        const el = document.getElementById('toast');
        if (!el) return;
        el.textContent = msg;
        el.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
      }
    }
  </script>
</body>
</html>
