<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 — 潘元川</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0a0a0a;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-box {
      background: #1a1a1a;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 48px 40px;
      width: 360px;
      max-width: 90vw;
    }
    .login-box h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: #f5c842;
    }
    .login-box p {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 32px;
    }
    .field {
      margin-bottom: 20px;
    }
    .field label {
      display: block;
      font-size: 0.8rem;
      color: #a0a0a0;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 12px 14px;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus {
      border-color: #f5c842;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #f5c842;
      color: #0a0a0a;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    .error {
      color: #ff4d4d;
      font-size: 0.85rem;
      margin-top: 12px;
      text-align: center;
      display: none;
    }
    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>潘元川</h1>
    <p>管理后台 · 请登录</p>
    <div class="field">
      <label>用户名</label>
      <input type="text" id="username" autocomplete="username" />
    </div>
    <div class="field">
      <label>密码</label>
      <input type="password" id="password" autocomplete="current-password" />
    </div>
    <button onclick="login()">登录</button>
    <div class="error" id="errorMsg">用户名或密码错误</div>
  </div>
  <script>
    if (localStorage.getItem('pan_token')) {
      window.location.href = '/admin/dashboard.html';
    }
    async function login() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('errorMsg');
      if (!username || !password) {
        errEl.textContent = '请输入用户名和密码';
        errEl.classList.add('show');
        return;
      }
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        if (!res.ok) throw new Error('登录失败');
        const data = await res.json();
        localStorage.setItem('pan_token', data.token);
        window.location.href = '/admin/dashboard.html';
      } catch {
        errEl.textContent = '用户名或密码错误';
        errEl.classList.add('show');
      }
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
